apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: poke-battle-sandbox
  namespace: default
spec:
  podTemplate:
    spec:
      containers:
      - name: battle-runtime
        image: mcr.microsoft.com/aks/poke-sandbox/battle-runtime:latest
        ports:
        - containerPort: 8888
        readinessProbe:
          httpGet:
            path: "/"
            port: 8888
          initialDelaySeconds: 2
          periodSeconds: 1
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
      restartPolicy: "OnFailure"
